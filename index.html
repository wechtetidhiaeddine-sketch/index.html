<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Programming Search AI Ultra</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {margin:0;font-family:Arial;background:#0f2027;color:white}
.container {max-width:700px;margin:auto;padding:20px}
.search-box {display:flex;background:white;border-radius:30px;padding:5px}
input {flex:1;border:none;outline:none;padding:12px;border-radius:30px}
button {background:#4285f4;color:white;border:none;padding:10px;border-radius:50%;cursor:pointer}
.card {background:rgba(255,255,255,0.1);padding:15px;border-radius:10px;margin-top:10px}
.row {display:flex;gap:10px;flex-wrap:wrap}
.small {font-size:12px;opacity:0.8}
</style>
</head>

<body>
<div class="container">
<h1>💻 AI Programming Ultra</h1>

<div class="search-box">
<input id="search" placeholder="Search...">
<button onclick="search()">🔍</button>
<button onclick="voice()">🎤</button>
</div>

<div id="results"></div>

<div class="card">
<h3>🤖 AI Chat</h3>
<input id="chatInput" placeholder="Ask AI...">
<button onclick="chatAI()">Send</button>
<div id="chat"></div>
</div>

<div class="card">
<h3>⭐ Favorites</h3>
<div id="fav"></div>
</div>

<div class="card">
<h3>📊 Compare</h3>
<input id="c1" placeholder="Lang 1">
<input id="c2" placeholder="Lang 2">
<button onclick="compare()">Compare</button>
<div id="compare"></div>
</div>

<div class="card">
<h3>🧠 Quiz</h3>
<div id="quiz"></div>
</div>

<div class="card">
<h3>🔐 Login (demo)</h3>
<input id="user" placeholder="username">
<button onclick="login()">Login</button>
<div id="userStatus"></div>
</div>

</div>

<script>
const API = "https://fr.wikipedia.org/api/rest_v1/page/summary/";

async function search() {
 const q = document.getElementById("search").value;
 if(!q) return;

 const res = await fetch(API + encodeURIComponent(q));
 const data = await res.json();

 document.getElementById("results").innerHTML = `
 <div class='card'>
 <h2>${data.title}</h2>
 <p>${data.extract || 'Pas de description disponible en français.'}</p>
 <button onclick="saveFav('${data.title}')">⭐ Save</button>
 </div>`;

 aiExplain(data.title);
 quiz(data.title);
}

function aiExplain(topic){
 document.getElementById("results").innerHTML += `
 <div class='card'>🤖 ${topic} est largement utilisé dans le développement moderne.</div>`;
}

function voice(){
 const rec = new webkitSpeechRecognition();
 rec.onresult = e => {
 document.getElementById("search").value = e.results[0][0].transcript;
 search();
 };
 rec.start();
}

async function chatAI(){
 const input = document.getElementById("chatInput").value;
 const chatDiv = document.getElementById("chat");

 if(!input) return;

 chatDiv.innerHTML += `<p>🧑 ${input}</p>`;

 try {
   const res = await fetch("https://api.mymemory.translated.net/get?q=" + encodeURIComponent(input) + "&langpair=en|fr");
   const data = await res.json();
   const reply = data.responseData.translatedText;

   chatDiv.innerHTML += `<p>🤖 AI (FR): ${reply}</p>`;
 } catch (e) {
   chatDiv.innerHTML += `<p>❌ Erreur</p>`;
 }
}

function saveFav(item){
 let fav = JSON.parse(localStorage.getItem("fav") || "[]");
 fav.push(item);
 localStorage.setItem("fav", JSON.stringify(fav));
 loadFav();
}

function loadFav(){
 let fav = JSON.parse(localStorage.getItem("fav") || "[]");
 document.getElementById("fav").innerHTML = fav.map(f => `<div>${f}</div>`).join("");
}
loadFav();

function compare(){
 const a = document.getElementById("c1").value;
 const b = document.getElementById("c2").value;

 if(!a || !b) return;

 document.getElementById("compare").innerHTML = `
 ${a} vs ${b} : ces deux langages sont puissants mais diffèrent selon leurs usages.`;
}

function quiz(topic){
 document.getElementById("quiz").innerHTML = `
 <div>${topic} est utilisé pour ?</div>
 <button onclick="alert('Programmation')">Réponse</button>`;
}

function login(){
 const user = document.getElementById("user").value;
 if(!user) return;

 localStorage.setItem("user", user);
 document.getElementById("userStatus").innerText = "Logged in as " + user;
}
</script>

<!--

Vercel / Netlify
-->

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>coding Search</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

.container{max-width:800px;margin:auto;padding:20px}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.1);
padding:15px;
border-radius:15px;
margin-top:12px;
transition:0.3s;
}

.card:hover{transform:scale(1.02)}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:20px;
border:none;
outline:none;
}

button{
padding:10px 15px;
border-radius:20px;
border:none;
cursor:pointer;
background:#4facfe;
color:white;
margin:5px;
}

button:hover{transform:scale(1.05)}

h1{margin-bottom:10px}
</style>
</head>

<body>

<div class="container">

<h1>🤖 coding Search</h1>

<div class="card">
<input id="q" placeholder="Search anything...">
<button onclick="search()">🔍 Search</button>
<button onclick="voice()">🎤 Voice</button>
</div>

<div id="result"></div>

<div class="card">
<h3>💬 AI Chat</h3>
<input id="chat" placeholder="Ask AI...">
<button onclick="askAI()">Send</button>
<div id="chatBox"></div>
</div>

<div class="card">
<h3>⚖ Compare</h3>
<input id="a" placeholder="Language 1">
<input id="b" placeholder="Language 2">
<button onclick="compare()">Compare</button>
<div id="cmp"></div>
</div>

<div class="card">
<h3>⭐ Favorites</h3>
<div id="fav"></div>
</div>

<div class="card">
<h3>🏆 Quiz Panel</h3>
<button onclick="resetQuiz()">🔄 Restart Quiz</button>
<button onclick="showLeaderboard()">🏆 Leaderboard</button>
<button onclick="generateAIQuiz('JavaScript')">🧠 AI Question</button>
</div>

</div>

<script>

const WIKI="https://fr.wikipedia.org/api/rest_v1/page/summary/";
const OPENAI_API_KEY="PUT_YOUR_KEY_HERE";

/* ---------- SEARCH ---------- */
async function search(){
let q=document.getElementById("q").value;
if(!q) return;

let res=await fetch(WIKI+q);
let data=await res.json();

document.getElementById("result").innerHTML=`
<div class="card">
<h2>${data.title}</h2>
<p>${data.extract || "No Wikipedia data"}</p>
</div>`;

showQuiz();
}

/* ---------- AI CHAT ---------- */
async function askAI(){
let msg=document.getElementById("chat").value;
if(!msg) return;

document.getElementById("chatBox").innerHTML+=`<p>🧑 ${msg}</p>`;

try{
let res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+OPENAI_API_KEY
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[{role:"user",content:msg}]
})
});

let data=await res.json();
let reply=data.choices[0].message.content;

document.getElementById("chatBox").innerHTML+=`<p>🤖 ${reply}</p>`;
}catch(e){
document.getElementById("chatBox").innerHTML+="<p>❌ AI Error</p>";
}
}

/* ---------- COMPARE ---------- */
function compare(){
let a=document.getElementById("a").value;
let b=document.getElementById("b").value;

document.getElementById("cmp").innerHTML=
`<p>${a} vs ${b}</p>
<p>👉 ${a} is strong in some areas, while ${b} has different strengths.</p>`;
}

/* ---------- FAVORITES ---------- */
function load(){
let f=JSON.parse(localStorage.getItem("fav")||"[]");
document.getElementById("fav").innerHTML=f.map(i=>`⭐ ${i}`).join("<br>");
}
load();

function save(x){
let f=JSON.parse(localStorage.getItem("fav")||"[]");
f.push(x);
localStorage.setItem("fav",JSON.stringify(f));
load();
}

/* ---------- QUIZ PRO MAX ---------- */

const quizBank=[
{q:"What is JavaScript used for?",options:["Design","Web interactivity","Database","AI only"],a:1},
{q:"React is a ...",options:["Library","Database","OS","Language"],a:0},
{q:"HTML stands for?",options:["Hyper Text Markup Language","Hot Mail","High Text Machine Language","None"],a:0}
];

let currentQ=0;
let score=0;
let timeLeft=10;
let timer;

/* SHOW QUIZ */
function showQuiz(){
clearInterval(timer);
timeLeft=10;

let q=quizBank[currentQ];
if(!q) return endQuiz();

document.getElementById("result").innerHTML+=`
<div class="card">
<h3>❓ Quiz</h3>
<p>${q.q}</p>

<p>⏱️ Time: <span id="time">${timeLeft}</span>s</p>

${q.options.map((o,i)=>
`<button onclick="answer(${i})">${o}</button><br>`
).join("")}

<p>⭐ Score: ${score}</p>
</div>`;

timer=setInterval(()=>{
timeLeft--;
document.getElementById("time").innerText=timeLeft;

if(timeLeft<=0){
clearInterval(timer);
currentQ++;
showQuiz();
}
},1000);
}

/* ANSWER */
function answer(i){
let q=quizBank[currentQ];

if(i===q.a) score++;

currentQ++;
showQuiz();
}

/* END */
function endQuiz(){
document.getElementById("result").innerHTML+=`
<div class="card">
🏁 Finished! Score: ${score}/${quizBank.length}
</div>`;

saveScore();
}

/* RESET */
function resetQuiz(){
currentQ=0;
score=0;
showQuiz();
}

/* LEADERBOARD */
function saveScore(){
let s=JSON.parse(localStorage.getItem("scores")||"[]");
s.push(score);
localStorage.setItem("scores",JSON.stringify(s));
}

function showLeaderboard(){
let s=JSON.parse(localStorage.getItem("scores")||"[]");

document.getElementById("result").innerHTML+=`
<div class="card">
<h3>🏆 Leaderboard</h3>
${s.sort((a,b)=>b-a).map(x=>`⭐ ${x}`).join("<br>")}
</div>`;
}

/* AI QUIZ */
async function generateAIQuiz(topic){
let res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+OPENAI_API_KEY
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[{role:"user",content:`Create a multiple choice question about ${topic}`}]
})
});

let data=await res.json();

document.getElementById("result").innerHTML+=`
<div class="card">
🤖 AI Quiz:
<p>${data.choices[0].message.content}</p>
</div>`;
}

/* VOICE */
function voice(){
let rec=new webkitSpeechRecognition();
rec.lang="en-US";

rec.onresult=e=>{
document.getElementById("q").value=e.results[0][0].transcript;
search();
};

rec.start();
}

</script>

</body>
</html>

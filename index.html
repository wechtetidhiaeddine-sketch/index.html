<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>🚀 Coding d&t</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

.container{max-width:900px;margin:auto;padding:20px}

/* ANIMATION */
.card{
background:rgba(255,255,255,0.08);
padding:20px;
margin-top:15px;
border-radius:15px;
opacity:0;
transform:translateY(30px);
animation:fadeIn 0.8s forwards;
}

@keyframes fadeIn{
to{opacity:1;transform:translateY(0);}
}

input{
width:100%;
padding:10px;
border-radius:20px;
border:none;
margin:5px 0;
}

button{
padding:10px;
border-radius:20px;
border:none;
background:#4facfe;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
background:#00c6ff;
}

.progress{
height:8px;
background:#ffffff33;
border-radius:10px;
margin:10px 0;
}

.bar{
height:100%;
background:#00ffcc;
width:0%;
}

#leaderboard{
background:#00000033;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Coding d&t</h1>

<!-- LOGIN -->
<div class="card">
<input id="user" placeholder="Username">
<button onclick="login()">Login</button>
<p id="welcome"></p>
</div>

<!-- BACKGROUND -->
<div class="card">
<h3>🖼️ Background</h3>
<input id="bgInput" placeholder="Image URL">
<button onclick="setBg()">Apply</button>
</div>

<!-- SEARCH -->
<div class="card">
<input id="q" placeholder="Recherche langage...">
<button onclick="search()">Search</button>
<div id="result"></div>
</div>

<!-- COMPARE -->
<div class="card">
<input id="a" placeholder="Langage 1">
<input id="b" placeholder="Langage 2">
<button onclick="compare()">Compare</button>
<div id="cmp"></div>
</div>

<!-- QUIZ -->
<div class="card">
<h3>🧠 Quiz</h3>
<button onclick="startQuiz()">Start</button>
<div id="quiz"></div>

<h3>🏆 Leaderboard</h3>
<div id="leaderboard"></div>
</div>

</div>

<script>

/* LOGIN */
function login(){
let u=user.value;
localStorage.setItem("user",u);
welcome.innerText="Bienvenue "+u;
}

/* BACKGROUND */
function setBg(){
let url=bgInput.value;
document.body.style.background=`url(${url}) center/cover`;
}

/* SEARCH + FIX VIDEO */
const WIKI="https://fr.wikipedia.org/api/rest_v1/page/summary/";

async function search(){
let query=q.value;

// wiki
let r=await fetch(WIKI+query);
let d=await r.json();

// 🎥 FIX: فيديو ثابت حسب اللغة
let videos={
"html":"UB1O30fR-EE",
"css":"yfoY53QXEnI",
"javascript":"PkZNo7MFNFg",
"python":"_uQrJ0TkZlc",
"java":"grEKMHGYyns"
};

let vid = videos[query.toLowerCase()];

// fallback إذا ما لقا
let videoHTML = vid 
? `<iframe width="100%" height="250" src="https://www.youtube.com/embed/${vid}" allowfullscreen></iframe>`
: `<p>⚠️ Pas de vidéo disponible</p>`;

result.innerHTML=`
<h2>${d.title || "Langage"}</h2>
<p>${d.extract || "Aucune description trouvée"}</p>

<h3>🎥 Vidéo</h3>
${videoHTML}
`;
}

/* COMPARE */
function compare(){
let lang1=a.value.toLowerCase();
let lang2=b.value.toLowerCase();

let data={
"javascript":"Langage web dynamique",
"python":"Langage IA et data",
"java":"Applications mobiles",
"c++":"Performance élevée",
"php":"Serveur web"
};

cmp.innerHTML=`
<h3>⚔️ Comparaison</h3>
<p><b>${lang1}</b>: ${data[lang1]||"?"}</p>
<p><b>${lang2}</b>: ${data[lang2]||"?"}</p>

<ul>
<li>Performance ⚡</li>
<li>Facilité 🧠</li>
<li>Utilisation 💼</li>
</ul>
`;
}

/* QUIZ */
let quizData=[
{q:"JS ?",o:["Web","Food","OS"],a:0},
{q:"HTML ?",o:["Structure","DB","AI"],a:0},
{q:"CSS ?",o:["Style","Server","Cloud"],a:0},
{q:"Python ?",o:["Simple","Hard","Game"],a:0}
];

let i=0,score=0,time=10,t;

function startQuiz(){
i=0;score=0;
next();
}

function next(){
clearInterval(t);

if(i>=quizData.length){
quiz.innerHTML=`Score: ${score}`;
saveScore(score);
showLeaderboard();
return;
}

let qd=quizData[i];

quiz.innerHTML=`
<p>${qd.q}</p>
<div class="progress"><div class="bar" id="bar"></div></div>
${qd.o.map((x,idx)=>`<button onclick="ans(${idx})">${x}</button>`).join("<br>")}
`;

time=10;

t=setInterval(()=>{
time--;
bar.style.width=(time*10)+"%";
if(time<=0){i++;next();}
},1000);
}

function ans(x){
if(x===quizData[i].a) score++;
i++;
next();
}

/* LEADERBOARD */
function saveScore(s){
let name=localStorage.getItem("user")||"Guest";
let board=JSON.parse(localStorage.getItem("board")||"[]");

board.push({name,score:s});
board.sort((a,b)=>b.score-a.score);

localStorage.setItem("board",JSON.stringify(board));
}

function showLeaderboard(){
let board=JSON.parse(localStorage.getItem("board")||"[]");

leaderboard.innerHTML=board
.slice(0,5)
.map(x=>`🏅 ${x.name} : ${x.score}`)
.join("<br>");
}

window.onload=showLeaderboard;

</script>

</body>
</html>

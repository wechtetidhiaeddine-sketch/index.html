<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>🚀 Coding d&t </title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

.container{max-width:900px;margin:auto;padding:20px}

.card{
background:rgba(255,255,255,0.08);
padding:20px;
margin-top:15px;
border-radius:15px;
animation:fadeIn 0.8s forwards;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

input{
width:100%;
padding:10px;
border-radius:20px;
border:none;
margin:5px 0;
}

button{
padding:10px;
border-radius:20px;
border:none;
background:#4facfe;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{transform:scale(1.05);background:#00c6ff;}

.video-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

iframe{
width:100%;
height:200px;
border-radius:10px;
border:none;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Coding d&t</h1>

<div class="card">
<input id="user" placeholder="Username">
<button onclick="login()">Login</button>
<p id="welcome"></p>
</div>

<div class="card">
<h3>🖼️ Background</h3>

<input id="bgInput" placeholder="Image URL">
<button onclick="setBg()">Apply URL</button>

<input type="file" id="fileBg" accept="image/*">
<button onclick="uploadBg()">Upload Image</button>
</div>

<div class="card">
<input id="q" placeholder="Recherche langage...">
<button onclick="search()">Search</button>
<div id="result"></div>
</div>

</div>

<script>

const YT_API = AIzaSyCN4R7OmMHyv1-cyQHPFcN7EMetNPv04KM;

const resultEl = document.getElementById("result");

function login(){
let u = document.getElementById("user").value;
localStorage.setItem("user",u);
document.getElementById("welcome").innerText = "Bienvenue " + u;
}

function setBg(){
let url = document.getElementById("bgInput").value;
document.body.style.background = `url(${url}) center/cover`;
}

function uploadBg(){
let file = document.getElementById("fileBg").files[0];
if(!file) return;

let reader = new FileReader();
reader.onload = e=>{
document.body.style.background = `url(${e.target.result}) center/cover`;
};
reader.readAsDataURL(file);
}

async function search(){

let query = document.getElementById("q").value;
if(!query) return;

try{

const WIKI = "https://fr.wikipedia.org/api/rest_v1/page/summary/";
let r = await fetch(WIKI + encodeURIComponent(query));
let d = await r.json();

let videosHTML = "";

try{
let yt = await fetch(
`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query + " programmation")}&type=video&maxResults=4&key=${YT_API}`
);

let data = await yt.json();

if(data.items){
videosHTML = `<div class="video-grid">` +
data.items.map(v =>
`<iframe src="https://www.youtube.com/embed/${v.id.videoId}" allowfullscreen></iframe>`
).join("") +
`</div>`;
}

}catch(e){
videosHTML = "<p>YouTube indisponible</p>";
}

resultEl.innerHTML = `
<h2>${d.title || query}</h2>
<p>${d.extract || "Aucune description"}</p>
<h3>🎥 Vidéos</h3>
${videosHTML}
`;

}catch(err){
resultEl.innerHTML = "<p>❌ Erreur de recherche</p>";
}

}

</script>

</body>
</html>

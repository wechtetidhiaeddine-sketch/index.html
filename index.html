<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>🚀 Coding d&t PRO MAX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
transition:0.4s;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:rgba(255,255,255,0.08);
padding:20px;
margin-top:15px;
border-radius:15px;
animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

input{
width:100%;
padding:10px;
border-radius:20px;
border:none;
margin:5px 0;
outline:none;
}

button{
padding:10px;
border-radius:20px;
border:none;
background:#4facfe;
color:white;
cursor:pointer;
margin-top:5px;
transition:0.2s;
}

button:hover{background:#00c6ff;transform:scale(1.03);}

img.result-img{
width:100%;
max-height:300px;
object-fit:cover;
border-radius:15px;
margin-top:10px;
}

/* QUIZ */
.progress{
height:8px;
background:#ffffff33;
border-radius:10px;
margin:10px 0;
overflow:hidden;
}

.bar{
height:100%;
background:#00ffcc;
width:0%;
transition:0.2s;
}

/* YOUTUBE BUTTON */
#ytBtn{
position:fixed;
bottom:20px;
right:20px;
background:red;
padding:12px 18px;
border-radius:50px;
display:none;
font-weight:bold;
cursor:pointer;
z-index:999;
}

/* BACKGROUND SECTION */
</style>
</head>

<body>

<div class="container">

<h1>🚀 Coding d&t PRO MAX</h1>

<!-- SEARCH -->
<div class="card">
<h3>🔎 Search</h3>
<input id="q" placeholder="Recherche n'importe quoi...">
<button onclick="search()">Search</button>
<div id="result"></div>
</div>

<!-- COMPARE -->
<div class="card">
<h3>⚔️ Compare Langages</h3>
<input id="a" placeholder="Langage 1">
<input id="b" placeholder="Langage 2">
<button onclick="compare()">Compare</button>
<div id="cmp"></div>
</div>

<!-- QUIZ -->
<div class="card">
<h3>🧠 Quiz Pro Max</h3>
<button onclick="startQuiz()">Start Quiz</button>
<div id="quiz"></div>
</div>

<!-- BACKGROUND -->
<div class="card">
<h3>🖼️ Background Control</h3>

<input id="bgUrl" placeholder="Image URL">
<button onclick="setBgUrl()">Apply URL</button>

<input type="file" id="bgFile" accept="image/*">
<button onclick="uploadBg()">Upload Image</button>
</div>

</div>

<!-- YOUTUBE BUTTON -->
<div id="ytBtn" onclick="openYT()">▶ YouTube</div>

<script>

let lastQuery="";

/* SEARCH */
async function search(){

let query=document.getElementById("q").value;
if(!query) return;

lastQuery=query;

const url="https://fr.wikipedia.org/api/rest_v1/page/summary/";

try{
let r=await fetch(url+encodeURIComponent(query));
let d=await r.json();

let img="";
if(d.thumbnail && d.thumbnail.source){
img=`<img class="result-img" src="${d.thumbnail.source}">`;
}

document.getElementById("result").innerHTML=`
<h2>${d.title || query}</h2>
<p style="line-height:1.6">${d.extract || "Aucune description trouvée."}</p>
${img}
`;

/* show youtube button */
document.getElementById("ytBtn").style.display="block";

}catch(e){
document.getElementById("result").innerHTML="❌ Erreur de recherche";
}

}

/* YOUTUBE */
function openYT(){
let q=lastQuery || "programmation";
window.open(
`https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`,
"_blank"
);
}

/* COMPARE */
function compare(){

let lang1=document.getElementById("a").value.toLowerCase();
let lang2=document.getElementById("b").value.toLowerCase();

const data={
javascript:"JavaScript est un langage web dynamique utilisé pour créer des sites interactifs, animations et applications modernes côté navigateur et serveur.",
python:"Python est un langage simple et puissant utilisé en intelligence artificielle, data science, automatisation et développement web.",
java:"Java est un langage robuste utilisé pour les applications Android et les systèmes d’entreprise.",
cpp:"C++ est un langage très rapide utilisé pour les jeux vidéo et les systèmes performants.",
php:"PHP est un langage backend utilisé pour les sites web dynamiques."
};

document.getElementById("cmp").innerHTML=`
<h3>⚔️ Résultat comparaison</h3>

<p><b>${lang1}</b></p>
<p>${data[lang1] || "Description non disponible"}</p>

<hr>

<p><b>${lang2}</b></p>
<p>${data[lang2] || "Description non disponible"}</p>
`;
}

/* QUIZ */
let quizData=[
{q:"HTML ?",o:["Structure","AI","OS"],a:0},
{q:"CSS ?",o:["Style","DB","CPU"],a:0},
{q:"JavaScript ?",o:["Interactivité","Hardware","Music"],a:0},
{q:"Python ?",o:["IA & Data","Game only","Image"],a:0},
{q:"SQL ?",o:["Database","Design","Video"],a:0},
{q:"API ?",o:["Interface","System","OS"],a:0},
{q:"HTTP ?",o:["Web protocol","Language","App"],a:0},
{q:"DOM ?",o:["HTML structure","Server","Cloud"],a:0}
];

let i=0,score=0,t,time=10;

function startQuiz(){
i=0;score=0;
showQuiz();
}

function showQuiz(){

clearInterval(t);

if(i>=quizData.length){
document.getElementById("quiz").innerHTML=
`🏆 Score final: ${score}/${quizData.length}`;
return;
}

let qd=quizData[i];

document.getElementById("quiz").innerHTML=`
<p>${qd.q}</p>
<div class="progress"><div class="bar" id="bar"></div></div>
${qd.o.map((x,idx)=>`<button onclick="ans(${idx})">${x}</button>`).join("")}
`;

time=10;

t=setInterval(()=>{
time--;
let bar=document.getElementById("bar");
if(bar) bar.style.width=(time*10)+"%";

if(time<=0){i++;showQuiz();}
},1000);
}

function ans(x){
if(x===quizData[i].a) score++;
i++;
showQuiz();
}

/* BACKGROUND URL */
function setBgUrl(){
let url=document.getElementById("bgUrl").value;
if(!url) return;
document.body.style.background=`url(${url}) center/cover`;
}

/* BACKGROUND UPLOAD */
function uploadBg(){
let file=document.getElementById("bgFile").files[0];
if(!file) return;

let reader=new FileReader();
reader.onload=function(e){
document.body.style.background=`url(${e.target.result}) center/cover`;
};
reader.readAsDataURL(file);
}

</script>

</body>
</html>

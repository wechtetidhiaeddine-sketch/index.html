<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>🚀 Coding D&T </title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #7000ff;
            --glass: rgba(255, 255, 255, 0.1);
            --bg-dark: #0f172a;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(0, 242, 254, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(79, 172, 254, 0.15) 0%, transparent 40%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container { max-width: 1100px; margin: auto; padding: 20px; }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            margin-bottom: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            font-size: 3rem;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
        }

        input, textarea {
            width: 100%; padding: 15px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3); color: white; margin: 10px 0; box-sizing: border-box;
            outline: none; transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 10px var(--primary); }

        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }

        button {
            flex: 1; padding: 15px; border-radius: 15px; border: none;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            color: white; font-weight: bold; cursor: pointer; transition: 0.3s; min-width: 120px;
        }

        button:hover { transform: scale(1.05); filter: brightness(1.2); }

        #code-preview {
            background: white; height: 200px; width: 100%; border-radius: 15px; margin-top: 10px; border: none;
        }

        .chart-container { max-width: 500px; margin: 20px auto; background: rgba(0,0,0,0.2); border-radius: 20px; padding: 15px; }

        .badge { background: var(--primary); color: #000; padding: 3px 10px; border-radius: 8px; font-size: 0.8rem; margin-right: 5px; }

        #voiceStatus { font-style: italic; color: var(--primary); font-size: 0.9rem; }
        
        .grid-compare { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }

        #ytBtn {
            position: fixed; bottom: 30px; right: 30px; background: #ff0000; padding: 15px 25px;
            border-radius: 50px; cursor: pointer; font-weight: bold; display: none; z-index: 999;
                    /* --- WIDGET INSTAGRAM --- */
       /* --- WIDGET INSTAGRAM --- */
        .insta-btn {
            position: fixed; bottom: 25px; left: 25px;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            padding: 12px 20px; border-radius: 50px; display: flex; align-items: center; gap: 10px;
            color: white; text-decoration: none; font-weight: bold; z-index: 999;
            box-shadow: 0 4px 15px rgba(220, 39, 67, 0.5);
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .card { animation: fadeIn 0.5s ease-out both; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Coding D&T <span style="color:white"></span></h1>

    <div class="card" style="text-align: center;">
        <h3>🎙️ Assistant Vocal IA</h3>
        <p id="voiceStatus">Prêt à écouter... (Dites "Compare HTML et Python")</p>
        <button onclick="startListening()">🎤 Activer le Micro</button>
    </div>

    <div class="card">
        <h3>🔎 Information Dynamique</h3>
        <input id="q" placeholder="Recherchez une technologie (ex: React, IA, Blockchain)...">
        <button onclick="superSearch()">Analyser le concept</button>
        <div id="result"></div>
    </div>

    <div class="card">
        <h3>⚔️ Duel de Langages (Analyse Radar)</h3>
        <div class="btn-group">
            <input id="lang1" placeholder="Langage 1 (ex: html)">
            <input id="lang2" placeholder="Langage 2 (ex: java script)">
        </div>
        <button onclick="superCompare()">Lancer la comparaison</button>
        
        <div class="chart-container">
            <canvas id="compareChart"></canvas>
        </div>
        <div id="compare-result" class="grid-compare"></div>
    </div>

    <div class="card">
        <h3>💻 Code Playground (HTML/CSS)</h3>
        <textarea id="html-code" placeholder="Écrivez votre code HTML ici..." rows="4"><h2>Test Direct</h2><p>Changez ce texte !</p></textarea>
        <button onclick="runCode()">Exécuter le code</button>
        <iframe id="code-preview"></iframe>
    </div>

    <div class="card">
        <h3>🧠 Quiz Coding</h3>
        <div id="quiz-area">
            <button onclick="startQuiz()">Lancer le défi</button>
        </div>
    </div>
</div>

<div id="ytBtn" onclick="openYT()">▶ Voir sur YouTube</div>
<a href="https://www.instagram.com/d_h_i_a_1_" target="_blank" class="insta-btn">
    <i class="fab fa-instagram"></i> Suivre Dhia
</a>

<script>
    // --- COLLECTION MISE À JOUR & CORRIGÉE ---
    const langDB = {
        javascript: { name: "JavaScript", stats: [95, 90, 85, 98, 90], desc: "Le roi du web, essentiel pour le front-end et le back-end.", power: "95%", speed: "Très rapide", use: "Web, Serveurs, Mobile" },
        html: { name: "HTML", stats: [100, 50, 95, 100, 80], desc: "La structure universelle du Web. Indispensable.", power: "Structure 100%", speed: "N/A", use: "Squelette des sites Web" },
        python: { name: "Python", stats: [90, 70, 95, 95, 95], desc: "Simple, puissant et favori pour l'Intelligence Artificielle.", power: "90%", speed: "Moyenne", use: "IA, Data Science, Automatisation" },
        java: { name: "Java", stats: [85, 85, 60, 80, 92], desc: "Robuste, sécurisé, utilisé pour les entreprises.", power: "85%", speed: "Rapide", use: "Android, Systèmes Bancaires" },
        cpp: { name: "C++", stats: [98, 100, 40, 75, 98], desc: "Ultra rapide, contrôle total sur le matériel.", power: "98%", speed: "Fulgurante", use: "Jeux Vidéo, Systèmes" },
        php: { name: "PHP", stats: [75, 75, 80, 70, 75], desc: "Le moteur derrière WordPress.", power: "75%", speed: "Bonne", use: "Web Back-end" }
    };

    let myChart = null;

    // --- SYNTHÈSE VOCALE ---
    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'fr-FR';
        window.speechSynthesis.speak(msg);
    }

    // --- RECONNAISSANCE VOCALE ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    function startListening() {
        if (!SpeechRecognition) return alert("Micro non supporté");
        const rec = new SpeechRecognition();
        rec.lang = 'fr-FR';
        rec.onstart = () => document.getElementById('voiceStatus').innerText = "Écoute en cours...";
        rec.onresult = (e) => {
            const transcript = e.results[0][0].transcript.toLowerCase();
            document.getElementById('voiceStatus').innerText = `Entendu : "${transcript}"`;
            if (transcript.includes("compare")) {
                const parts = transcript.replace("compare", "").split(" et ");
                if (parts.length === 2) {
                    document.getElementById('lang1').value = parts[0].trim();
                    document.getElementById('lang2').value = parts[1].trim();
                    superCompare();
                }
            }
        };
        rec.start();
    }

    // --- RECHERCHE WIKIPEDIA ---
    async function superSearch() {
        const q = document.getElementById('q').value;
        if(!q) return;
        const resDiv = document.getElementById('result');
        resDiv.innerHTML = "Recherche...";
        try {
            const r = await fetch(`https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`);
            const d = await r.json();
            resDiv.innerHTML = `<h4>${d.title}</h4><p>${d.extract}</p>${d.thumbnail ? `<img src="${d.thumbnail.source}" class="result-img">`:''}`;
            document.getElementById('ytBtn').style.display = "block";
            speak(`Infos sur ${d.title}`);
        } catch(e) { resDiv.innerHTML = "❌ Introuvable."; }
    }

    // --- COMPARAISON AVEC CORRECTION D'ESPACES ---
    function superCompare() {
        // .replace(/\s+/g, '') transforme "java script" en "javascript"
        const l1 = document.getElementById('lang1').value.toLowerCase().replace(/\s+/g, '').trim();
        const l2 = document.getElementById('lang2').value.toLowerCase().replace(/\s+/g, '').trim();
        const container = document.getElementById('compare-result');

        if (!langDB[l1] || !langDB[l2]) {
            speak("Un des langages est inconnu.");
            container.innerHTML = "<p>Erreur : Langage non reconnu (vérifiez l'orthographe).</p>";
            return;
        }

        // Rendu Graphique
        const ctx = document.getElementById('compareChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['Puissance', 'Vitesse', 'Facilité', 'Popularité', 'Salaire'],
                datasets: [
                    { label: langDB[l1].name, data: langDB[l1].stats, borderColor: '#00f2fe', backgroundColor: 'rgba(0,242,254,0.2)' },
                    { label: langDB[l2].name, data: langDB[l2].stats, borderColor: '#7000ff', backgroundColor: 'rgba(112,0,255,0.2)' }
                ]
            },
            options: { scales: { r: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { display: false }, min: 0, max: 100 } } }
        });

        // Rendu Cartes
        const buildCard = (l) => `
            <div class="card" style="margin:0; background:rgba(255,255,255,0.05)">
                <h4 style="color:var(--primary)">${langDB[l].name.toUpperCase()}</h4>
                <p style="font-size:0.85rem">${langDB[l].desc}</p>
                <div><span class="badge">Usage:</span> ${langDB[l].use}</div>
            </div>`;
        
        container.innerHTML = buildCard(l1) + buildCard(l2);
        speak(`Comparaison entre ${langDB[l1].name} et ${langDB[l2].name} terminée.`);
    }

    function runCode() {
        const code = document.getElementById('html-code').value;
        const preview = document.getElementById('code-preview').contentWindow.document;
        preview.open(); preview.write(code); preview.close();
    }

    // Quiz
    let curQ = 0, score = 0;
    const questions = [
        { q: "Quel langage pour l'IA ?", o: ["PHP", "Python", "HTML"], a: 1 },
        { q: "Structure du web ?", o: ["CSS", "SQL", "HTML"], a: 2 }
    ];
    function startQuiz() { curQ = 0; score = 0; showQ(); }
    function showQ() {
        const area = document.getElementById('quiz-area');
        if(curQ >= questions.length) { area.innerHTML = `<h3>${score}/${questions.length} 🏆</h3><button onclick="startQuiz()">Rejouer</button>`; return; }
        const q = questions[curQ];
        area.innerHTML = `<p>${q.q}</p><div class="btn-group">${q.o.map((opt, i) => `<button onclick="check(${i})">${opt}</button>`).join('')}</div>`;
    }
    function check(i) { if(i === questions[curQ].a) score++; curQ++; showQ(); }

    function changeBg() { document.body.style.background = `url('${document.getElementById('bgInput').value}') center/cover fixed`; }
    function openYT() { window.open(`https://www.youtube.com/results?search_query=${document.getElementById('q').value}`, "_blank"); }
</script>
</body>
</html>

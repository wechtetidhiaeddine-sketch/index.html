<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>🚀 AI coding d&t</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
transition:0.5s;
}

.container{max-width:900px;margin:auto;padding:20px}

.card{
background:rgba(255,255,255,0.08);
padding:20px;
margin-top:15px;
border-radius:15px;
}

input{
width:100%;
padding:10px;
border-radius:20px;
border:none;
margin:5px 0;
}

button{
padding:10px 15px;
border-radius:20px;
border:none;
background:#4facfe;
color:white;
cursor:pointer;
}

.progress{
height:8px;
background:#ffffff33;
border-radius:10px;
margin:10px 0;
}

.bar{
height:100%;
background:#00ffcc;
width:0%;
}
</style>
</head>

<body>

<div class="container">

<h1>🤖AI coding d&t </h1>

<!-- LOGIN -->
<div class="card">
<input id="user" placeholder="Username">
<button onclick="login()">Login</button>
<p id="welcome"></p>
</div>

<!-- BACKGROUND -->
<div class="card">
<h3>🖼️ Background</h3>

<input id="bgInput" placeholder="Lien image...">
<button onclick="setBg()">Apply URL</button>

<br><br>

<input type="file" id="uploadBg" accept="image/*">
<button onclick="uploadBg()">Upload Image</button>

</div>

<!-- SEARCH -->
<div class="card">
<input id="q" placeholder="Recherche...">
<button onclick="search()">Search</button>
<button onclick="voice()">🎤</button>
<div id="result"></div>
</div>

<!-- AI -->
<div class="card">
<input id="msg" placeholder="Ask AI...">
<button onclick="chat()">Send</button>
<div id="chatBox"></div>
</div>

<!-- COMPARE -->
<div class="card">
<input id="a" placeholder="Langage 1">
<input id="b" placeholder="Langage 2">
<button onclick="compare()">Compare</button>
<div id="cmp"></div>
</div>

<!-- FAVORITES -->
<div class="card">
<h3>⭐ Favoris</h3>
<div id="fav"></div>
</div>

<!-- QUIZ -->
<div class="card">
<h3>🧠 Quiz</h3>
<button onclick="startQuiz()">Start</button>
<button onclick="aiQuiz()">AI Quiz</button>
<div id="quiz"></div>
</div>

</div>

<script>

/* LOGIN */
function login(){
let u=user.value;
localStorage.setItem("user",u);
welcome.innerText="Bienvenue "+u;
}

/* BACKGROUND URL */
function setBg(){
let url = document.getElementById("bgInput").value;

document.body.style.background = `url(${url}) no-repeat center center/cover`;

localStorage.setItem("bg", url);
}

/* BACKGROUND UPLOAD */
function uploadBg(){
let file = document.getElementById("uploadBg").files[0];

if(!file) return;

let reader = new FileReader();

reader.onload = function(e){
let img = e.target.result;

document.body.style.background = `url(${img}) no-repeat center center/cover`;

// نحفظ الصورة (base64)
localStorage.setItem("bg", img);
};

reader.readAsDataURL(file);
}

/* LOAD BACKGROUND */
window.onload = function(){
let bg = localStorage.getItem("bg");

if(bg){
document.body.style.background = `url(${bg}) no-repeat center center/cover`;
}

loadFav();
}

/* SEARCH */
const WIKI="https://fr.wikipedia.org/api/rest_v1/page/summary/";

async function search(){
let q=document.getElementById("q").value;
let r=await fetch(WIKI+q);
let d=await r.json();

result.innerHTML=`
<h2>${d.title}</h2>
<p>${d.extract}</p>
<button onclick="save('${d.title}')">⭐</button>`;
}

/* AI CHAT */
async function chat(){
let msg=document.getElementById("msg").value;

chatBox.innerHTML+=`<p>🧑 ${msg}</p>`;

let r=await fetch("http://localhost:3000/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({msg})
});

let d=await r.json();
chatBox.innerHTML+=`<p>🤖 ${d.reply}</p>`;
}

/* COMPARE */
function compare(){
cmp.innerHTML=`👉 ${a.value} est différent de ${b.value}`;
}

/* FAVORITES */
function loadFav(){
let f=JSON.parse(localStorage.getItem("fav")||"[]");
fav.innerHTML=f.map(x=>`⭐ ${x}`).join("<br>");
}

function save(x){
let f=JSON.parse(localStorage.getItem("fav")||"[]");
f.push(x);
localStorage.setItem("fav",JSON.stringify(f));
loadFav();
}

/* QUIZ */
let quizData=[
{q:"JS sert à ?",o:["Design","Interaction web","DB"],a:1},
{q:"HTML ?",o:["Langage","Email","OS"],a:0}
];

let i=0,score=0,time=10,t;

function startQuiz(){
i=0;score=0;
next();
}

function next(){
clearInterval(t);

if(i>=quizData.length){
quiz.innerHTML=`Score: ${score}`;
return;
}

let q=quizData[i];

quiz.innerHTML=`
<p>${q.q}</p>
<div class="progress"><div class="bar" id="bar"></div></div>
${q.o.map((x,idx)=>`<button onclick="ans(${idx})">${x}</button>`).join("<br>")}
`;

time=10;

t=setInterval(()=>{
time--;
bar.style.width=(time*10)+"%";

if(time<=0){
i++;next();
}
},1000);
}

function ans(x){
if(x===quizData[i].a) score++;
i++;
next();
}

/* AI QUIZ */
async function aiQuiz(){
let r=await fetch("http://localhost:3000/quiz",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({topic:"programmation"})
});

let d=await r.json();
quiz.innerHTML=`<p>${d.q}</p>`;
}

/* VOICE */
function voice(){
let r=new webkitSpeechRecognition();
r.lang="fr-FR";
r.onresult=e=>{
q.value=e.results[0][0].transcript;
search();
};
r.start();
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>🚀 Coding D&T </title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #f093fb;
            --glass: rgba(255, 255, 255, 0.1);
            --bg-dark: #0f172a;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(0, 242, 254, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(79, 172, 254, 0.15) 0%, transparent 40%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }

        /* Effet Glassmorphism */
        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            margin-bottom: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            font-size: 3rem;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
        }

        input, textarea {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            margin: 10px 0;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 10px var(--primary); }

        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }

        button {
            flex: 1;
            padding: 15px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            min-width: 120px;
        }

        button:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* Preview du Code */
        #code-preview {
            background: white;
            height: 200px;
            width: 100%;
            border-radius: 15px;
            margin-top: 10px;
            border: none;
        }

        .result-img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 20px;
            margin-top: 20px;
            border: 2px solid var(--primary);
        }

        .progress-container { height: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 15px 0; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; border-radius: 10px; transition: 0.3s; }

        #ytBtn {
            position: fixed; bottom: 30px; right: 30px;
            background: #ff0000; padding: 15px 25px;
            border-radius: 50px; cursor: pointer; font-weight: bold;
            display: none; z-index: 999; box-shadow: 0 0 20px rgba(255,0,0,0.4);
        }

        .badge {
            background: var(--primary); color: #000; padding: 3px 10px;
            border-radius: 8px; font-size: 0.8rem; margin-right: 5px;
        }

        .grid-compare {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Coding D&T <span style="color:white"></span></h1>

    <div class="card">
        <h3>🔎Information</h3>
        <input id="q" placeholder="Recherchez une technologie (ex: React, IA, Blockchain)...">
        <button onclick="superSearch()">Analyser le concept</button>
        <div id="result"></div>
    </div>

    <div class="card">
        <h3>⚔️ Duel de Langages</h3>
        <div class="btn-group">
            <input id="lang1" placeholder="Langage 1">
            <input id="lang2" placeholder="Langage 2">
        </div>
        <button onclick="superCompare()">Lancer la comparaison</button>
        <div id="compare-result" class="grid-compare"></div>
    </div>

    <div class="card">
        <h3>💻 Code Playground (HTML/CSS)</h3>
        <textarea id="html-code" placeholder="Écrivez votre code HTML ici..." rows="4"><h2>Bienvenue dans le Labo !</h2><p>Modifiez ce code pour voir le résultat en direct.</p></textarea>
        <button onclick="runCode()">Exécuter le code</button>
        <iframe id="code-preview"></iframe>
    </div>

    <div class="card">
        <h3>🧠 Master Quiz Coding</h3>
        <div id="quiz-area">
            <button onclick="startQuiz()">Lancer le défi</button>
        </div>
    </div>

    <div class="card">
        <h3>🎨 Studio de Personnalisation</h3>
        <div class="btn-group">
            <input id="bgInput" placeholder="URL de l'image de fond...">
            <button onclick="changeBg()">Changer le look</button>
        </div>
    </div>
</div>

<div id="ytBtn" onclick="openYT()">▶ Voir des tutoriels sur YouTube</div>

<script>
    // Base de données des langages
    const langDB = {
        javascript: { name: "JavaScript", desc: "Le roi du web, essentiel pour le front-end et le back-end.", power: "95%", speed: "Très rapide", use: "Web, Serveurs, Mobile" },
        python: { name: "Python", desc: "Simple, puissant et favori pour l'Intelligence Artificielle.", power: "90%", speed: "Moyenne", use: "IA, Data Science, Automatisation" },
        java: { name: "Java", desc: "Robuste, sécurisé, utilisé pour les applications d'entreprise.", power: "85%", speed: "Rapide", use: "Android, Systèmes Bancaires" },
        cpp: { name: "C++", desc: "Ultra rapide, offre un contrôle total sur le matériel.", power: "98%", speed: "Fulgurante", use: "Jeux Vidéo, Systèmes" },
        php: { name: "PHP", desc: "Le moteur derrière WordPress et une grande partie du web.", power: "75%", speed: "Bonne", use: "Développement Web Back-end" }
    };

    // Synthèse vocale en Français
    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'fr-FR';
        window.speechSynthesis.speak(msg);
    }

    // Recherche via Wikipedia
    async function superSearch() {
        const query = document.getElementById('q').value;
        if(!query) return;
        const resDiv = document.getElementById('result');
        resDiv.innerHTML = "Connexion à la base de données...";
        
        try {
            const response = await fetch(`https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
            const data = await response.json();
            
            resDiv.innerHTML = `
                <h2 style="color:var(--primary)">${data.title}</h2>
                <p style="line-height:1.8">${data.extract || "Aucune description disponible."}</p>
                ${data.thumbnail ? `<img src="${data.thumbnail.source}" class="result-img">` : ''}
            `;
            document.getElementById('ytBtn').style.display = "block";
            speak(`Voici des informations sur ${data.title}`);
        } catch(e) {
            resDiv.innerHTML = "❌ Impossible de trouver des informations.";
        }
    }

    // Comparaison intelligente
    function superCompare() {
        const l1 = document.getElementById('lang1').value.toLowerCase().trim();
        const l2 = document.getElementById('lang2').value.toLowerCase().trim();
        const container = document.getElementById('compare-result');

        const getCard = (lang) => {
            const info = langDB[lang] || { name: lang, desc: "Ce langage n'est pas encore dans notre base locale.", power: "??", speed: "Inconnue", use: "Inconnu" };
            return `
                <div class="card" style="margin:0; background:rgba(255,255,255,0.05)">
                    <h4 style="color:var(--primary)">${info.name.toUpperCase()}</h4>
                    <p style="font-size:0.9rem">${info.desc}</p>
                    <hr style="opacity:0.2">
                    <div><span class="badge">Puissance :</span> ${info.power}</div>
                    <div><span class="badge">Vitesse :</span> ${info.speed}</div>
                    <div><span class="badge">Usage :</span> ${info.use}</div>
                </div>
            `;
        };

        container.innerHTML = getCard(l1) + getCard(l2);
        speak("Comparaison terminée.");
    }

    // Exécuter le code HTML
    function runCode() {
        const code = document.getElementById('html-code').value;
        const preview = document.getElementById('code-preview').contentWindow.document;
        preview.open();
        preview.write(code);
        preview.close();
    }

    // Quiz en Français
    let currentQ = 0, score = 0;
    const questions = [
        { q: "Quel langage est le plus utilisé pour l'IA ?", o: ["PHP", "Python", "HTML"], a: 1 },
        { q: "Quelle technologie définit la structure d'un site ?", o: ["CSS", "SQL", "HTML"], a: 2 },
        { q: "Quel langage s'exécute directement dans le navigateur ?", o: ["Java", "JavaScript", "C++"], a: 1 }
    ];

    function startQuiz() {
        currentQ = 0; score = 0;
        showQuestion();
    }

    function showQuestion() {
        const area = document.getElementById('quiz-area');
        if(currentQ >= questions.length) {
            area.innerHTML = `<h3>Score final : ${score}/${questions.length} 🏆</h3><button onclick="startQuiz()">Recommencer</button>`;
            return;
        }
        const q = questions[currentQ];
        area.innerHTML = `
            <p style="font-weight:bold">${q.q}</p>
            <div class="progress-container"><div class="progress-bar" id="pb"></div></div>
            <div class="btn-group">
                ${q.o.map((opt, i) => `<button onclick="checkAns(${i})">${opt}</button>`).join('')}
            </div>
        `;
        setTimeout(() => document.getElementById('pb').style.width = ((currentQ+1)/questions.length*100)+"%", 50);
    }

    function checkAns(idx) {
        if(idx === questions[currentQ].a) score++;
        currentQ++;
        showQuestion();
    }

    // Personnalisation
    function changeBg() {
        const url = document.getElementById('bgInput').value;
        document.body.style.background = `url('${url}') center/cover fixed`;
    }

    function openYT() {
        const q = document.getElementById('q').value || "programming";
        window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`, "_blank");
    }
</script>

</body>
</html>

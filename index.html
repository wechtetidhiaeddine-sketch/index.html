<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>🚀 Coding d&t PRO MAX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

.container{max-width:900px;margin:auto;padding:20px}

.card{
background:rgba(255,255,255,0.08);
padding:20px;
margin-top:15px;
border-radius:15px;
animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

input{
width:100%;
padding:10px;
border-radius:20px;
border:none;
margin:5px 0;
}

button{
padding:10px;
border-radius:20px;
border:none;
background:#4facfe;
color:white;
cursor:pointer;
margin-top:5px;
}

button:hover{background:#00c6ff}

#ytBtn{
position:fixed;
bottom:20px;
right:20px;
background:red;
padding:12px 18px;
border-radius:50px;
display:none;
font-weight:bold;
cursor:pointer;
z-index:999;
}

img.result-img{
width:100%;
max-height:300px;
object-fit:cover;
border-radius:15px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Coding d&t PRO MAX</h1>

<!-- BACKGROUND -->
<div class="card">
<h3>🖼️ Background</h3>

<input id="bgUrl" placeholder="Image URL">
<button onclick="setBgUrl()">Apply URL</button>

<input type="file" id="bgFile" accept="image/*">
<button onclick="uploadBg()">Upload from device</button>
</div>

<!-- SEARCH -->
<div class="card">
<input id="q" placeholder="Recherche...">
<button onclick="search()">Search</button>
<div id="result"></div>
</div>

<!-- QUIZ -->
<div class="card">
<h3>🧠 Quiz</h3>
<button onclick="startQuiz()">Start Quiz</button>
<div id="quiz"></div>
</div>

</div>

<!-- YOUTUBE -->
<div id="ytBtn" onclick="openYT()">▶ YouTube</div>

<script>

let lastQuery="";

/* BACKGROUND URL */
function setBgUrl(){
let url=document.getElementById("bgUrl").value;
document.body.style.background=`url(${url}) center/cover`;
}

/* BACKGROUND UPLOAD */
function uploadBg(){
let file=document.getElementById("bgFile").files[0];
if(!file) return;

let reader=new FileReader();
reader.onload=e=>{
document.body.style.background=`url(${e.target.result}) center/cover`;
};
reader.readAsDataURL(file);
}

/* SEARCH + IMAGE FIX */
async function search(){

let query=document.getElementById("q").value;
if(!query) return;

lastQuery=query;

const url="https://fr.wikipedia.org/api/rest_v1/page/summary/";

try{
let r=await fetch(url+encodeURIComponent(query));
let d=await r.json();

/* image fix */
let imgHTML="";
if(d.thumbnail && d.thumbnail.source){
imgHTML=`<img class="result-img" src="${d.thumbnail.source}">`;
}

document.getElementById("result").innerHTML=`
<h2>${d.title || query}</h2>
<p style="line-height:1.6">${d.extract || "Aucune description trouvée."}</p>
${imgHTML}
`;

/* show youtube button */
document.getElementById("ytBtn").style.display="block";

}catch(e){
document.getElementById("result").innerHTML="❌ Erreur";
}

}

/* YOUTUBE */
function openYT(){
let q=lastQuery || "programmation";
window.open(
`https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`,
"_blank"
);
}

/* QUIZ */
let quizData=[
{q:"HTML ?",o:["Structure","AI","OS"],a:0},
{q:"CSS ?",o:["Style","DB","CPU"],a:0},
{q:"JS ?",o:["Interactivité","Hardware","Cloud"],a:0},
{q:"Python ?",o:["IA","Music","Game"],a:0},
{q:"SQL ?",o:["Database","Design","Video"],a:0},
{q:"HTTP ?",o:["Web protocol","Language","App"],a:0},
{q:"API ?",o:["Interface","Image","System"],a:0}
];

let i=0,score=0,t;

function startQuiz(){
i=0;score=0;
next();
}

function next(){

clearInterval(t);

if(i>=quizData.length){
document.getElementById("quiz").innerHTML=
`🏆 Score: ${score}/${quizData.length}`;
return;
}

let qd=quizData[i];

document.getElementById("quiz").innerHTML=`
<p>${qd.q}</p>
${qd.o.map((x,idx)=>`<button onclick="ans(${idx})">${x}</button>`).join("")}
`;

t=setTimeout(()=>{
i++;
next();
},10000);
}

function ans(x){
if(x===quizData[i].a) score++;
i++;
next();
}

</script>

</body>
</html>

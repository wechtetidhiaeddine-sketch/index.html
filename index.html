<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>🚀 Coding d&t PRO MAX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

.container{max-width:900px;margin:auto;padding:20px}

.card{
background:rgba(255,255,255,0.08);
padding:20px;
margin-top:15px;
border-radius:15px;
animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

input{
width:100%;
padding:10px;
border-radius:20px;
border:none;
margin:5px 0;
}

button{
padding:10px;
border-radius:20px;
border:none;
background:#4facfe;
color:white;
cursor:pointer;
margin-top:5px;
}

button:hover{background:#00c6ff}

/* YouTube button hidden first */
#ytBtn{
position:fixed;
bottom:20px;
right:20px;
background:red;
padding:12px 18px;
border-radius:50px;
display:none;
font-weight:bold;
cursor:pointer;
z-index:999;
}

/* Quiz */
.progress{
height:8px;
background:#ffffff33;
border-radius:10px;
margin:10px 0;
}

.bar{
height:100%;
background:#00ffcc;
width:0%;
transition:0.2s;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Coding d&t PRO MAX</h1>

<!-- SEARCH -->
<div class="card">
<input id="q" placeholder="Recherche n'importe quoi...">
<button onclick="search()">Search</button>
<div id="result"></div>
</div>

<!-- QUIZ -->
<div class="card">
<h3>🧠 Quiz Pro Max</h3>
<button onclick="startQuiz()">Start Quiz</button>
<div id="quiz"></div>
</div>

</div>

<!-- YOUTUBE BUTTON -->
<div id="ytBtn" onclick="openYT()">
▶ YouTube
</div>

<script>

let lastQuery="";

/* SEARCH */
async function search(){

let query=document.getElementById("q").value;
if(!query) return;

lastQuery=query;

/* Wikipedia long definition */
const url="https://fr.wikipedia.org/api/rest_v1/page/summary/";

try{
let r=await fetch(url+encodeURIComponent(query));
let d=await r.json();

document.getElementById("result").innerHTML=`
<h2>${d.title || query}</h2>
<p style="line-height:1.6">${d.extract || "Aucune description trouvée."}</p>
`;

/* show youtube button after search */
document.getElementById("ytBtn").style.display="block";

}catch(e){
document.getElementById("result").innerHTML="❌ Erreur de recherche";
}

}

/* YOUTUBE OPEN */
function openYT(){
let q = lastQuery || "education";
window.open(
`https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`,
"_blank"
);
}

/* QUIZ LONG */
let quizData=[
{q:"Qu'est-ce que HTML ?",o:["Langage de structure","Langage IA","Système OS"],a:0},
{q:"CSS sert à ?",o:["Style","Base de données","Serveur"],a:0},
{q:"JavaScript ?",o:["Interactivité web","Machine physique","Image"],a:0},
{q:"Python utilisé pour ?",o:["IA et Data","Musique","Hardware"],a:0},
{q:"SQL sert à ?",o:["Base de données","Design","Gaming"],a:0},
{q:"HTTP est ?",o:["Protocole web","Langage","Système"],a:0},
{q:"DOM en JS ?",o:["Structure HTML","Serveur","CSS"],a:0},
{q:"API signifie ?",o:["Interface applications","Image","OS"],a:0},
{q:"Frontend ?",o:["Interface utilisateur","Serveur","Database"],a:0},
{q:"Backend ?",o:["Logique serveur","Design","Animation"],a:0}
];

let i=0,score=0,t,time=10;

/* QUIZ */
function startQuiz(){
i=0;score=0;
next();
}

function next(){

clearInterval(t);

if(i>=quizData.length){
document.getElementById("quiz").innerHTML=
`🏆 Score final: ${score}/${quizData.length}`;
return;
}

let qd=quizData[i];

document.getElementById("quiz").innerHTML=`
<p>${qd.q}</p>
<div class="progress"><div class="bar" id="bar"></div></div>
${qd.o.map((x,idx)=>`<button onclick="ans(${idx})">${x}</button>`).join("")}
`;

time=10;

t=setInterval(()=>{
time--;
let bar=document.getElementById("bar");
if(bar) bar.style.width=(time*10)+"%";

if(time<=0){i++;next();}
},1000);
}

function ans(x){
if(x===quizData[i].a) score++;
i++;
next();
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>🚀 Coding D&T</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
--primary:#00f2fe;
--secondary:#4facfe;
--accent:#7000ff;
--glass:rgba(255,255,255,0.1);
--bg-dark:#0f172a;
}

body{
margin:0;
font-family:Segoe UI;
background:var(--bg-dark);
color:white;
transition:0.5s;
background-size:cover;
background-position:center;
}

.container{max-width:1100px;margin:auto;padding:20px;}

h1{
text-align:center;
font-size:3rem;
background:linear-gradient(45deg,var(--primary),var(--accent));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.card{
background:var(--glass);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.1);
padding:25px;
margin-bottom:30px;
border-radius:25px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
animation:fadeIn .5s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;}
}

input,textarea{
width:100%;
padding:15px;
border-radius:15px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(0,0,0,0.3);
color:white;
margin:10px 0;
}

button{
padding:15px;
border:none;
border-radius:15px;
background:linear-gradient(45deg,var(--secondary),var(--primary));
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{transform:scale(1.05);}

.result-img{
width:100%;
border-radius:15px;
margin-top:10px;
}

#ytBtn{
position:fixed;
bottom:30px;
right:30px;
background:#ff0000;
padding:15px 25px;
border-radius:50px;
display:none;
cursor:pointer;
font-weight:bold;
z-index:999;
}
#ytBtn:hover{transform:scale(1.1);}

.insta-btn{
position:fixed;
bottom:25px;
left:25px;
background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
padding:12px 20px;
border-radius:50px;
color:white;
text-decoration:none;
}

.chart-container{max-width:500px;margin:auto;}

.grid-compare{display:grid;grid-template-columns:1fr 1fr;gap:15px;}

#code-preview{width:100%;height:200px;border:none;background:white;}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Coding D&T</h1>

<!-- BACKGROUND CONTROL -->
<div class="card">
<h3>🎨 Background Settings</h3>

<input id="bgUrl" placeholder="Paste image URL...">
<button onclick="setBgUrl()">Set Background URL</button>

<input type="file" accept="image/*" onchange="uploadBg(event)">
</div>

<!-- SEARCH -->
<div class="card">
<h3>🔎 Recherche IA</h3>
<input id="q" placeholder="ex: Python">
<button onclick="superSearch()">Analyser</button>
<div id="result"></div>
</div>

<!-- COMPARE -->
<div class="card">
<h3>⚔️ Comparaison</h3>
<input id="lang1" placeholder="Langage 1">
<input id="lang2" placeholder="Langage 2">
<button onclick="superCompare()">Comparer</button>

<div class="chart-container">
<canvas id="compareChart"></canvas>
</div>

<div id="compare-result" class="grid-compare"></div>
</div>

<!-- PLAYGROUND -->
<div class="card">
<h3>💻 Code Playground</h3>
<textarea id="html-code"><h2>Hello Dhia 🔥</h2></textarea>
<button onclick="runCode()">Run</button>
<iframe id="code-preview"></iframe>
</div>

<!-- QUIZ -->
<div class="card">
<h3>🧠 Quiz</h3>
<div id="quiz"></div>
<button onclick="startQuiz()">Start</button>
</div>

<!-- GAME GENERATOR -->
<div class="card">
<h3>🎮 Game Generator</h3>
<input id="gameName" placeholder="ex: snake">
<button onclick="generateGame()">Generate Game</button>
<iframe id="gamePreview" style="width:100%;height:300px;border:none;background:white;"></iframe>
</div>

</div>

<div id="ytBtn" onclick="openYT()">▶ YouTube</div>

<a href="https://www.instagram.com/d_h_i_a_1_" target="_blank" class="insta-btn">
Instagram
</a>

<script>
// DB
const langDB={
javascript:{name:"JavaScript",stats:[95,90,85,98,90],desc:"Langage web"},
python:{name:"Python",stats:[90,70,95,95,95],desc:"IA king"},
html:{name:"HTML",stats:[100,50,95,100,80],desc:"Structure"}
};

let chart=null;

// BACKGROUND URL
function setBgUrl(){
let url=document.getElementById("bgUrl").value;
document.body.style.background=`url('${url}') center/cover no-repeat fixed`;
}

// BACKGROUND UPLOAD
function uploadBg(e){
let file=e.target.files[0];
let reader=new FileReader();

reader.onload=function(ev){
document.body.style.background=`url('${ev.target.result}') center/cover no-repeat fixed`;
};

reader.readAsDataURL(file);
}

// Search
async function superSearch(){
let q=document.getElementById("q").value;
let res=document.getElementById("result");
res.innerHTML="Loading...";
let r=await fetch("https://fr.wikipedia.org/api/rest_v1/page/summary/"+q);
let d=await r.json();

res.innerHTML=`
<h3>${d.title}</h3>
<p>${d.extract}</p>
${d.thumbnail?`<img src="${d.thumbnail.source}" class="result-img">`:''}
`;

document.getElementById("ytBtn").style.display="block";
}

// Compare
function superCompare(){
let l1=document.getElementById("lang1").value.toLowerCase().replace(/\s/g,'');
let l2=document.getElementById("lang2").value.toLowerCase().replace(/\s/g,'');

if(!langDB[l1]||!langDB[l2]) return alert("Langage inconnu");

let ctx=document.getElementById("compareChart");
if(chart) chart.destroy();

chart=new Chart(ctx,{
type:'radar',
data:{
labels:['Power','Speed','Easy','Popular','Salary'],
datasets:[
{label:langDB[l1].name,data:langDB[l1].stats},
{label:langDB[l2].name,data:langDB[l2].stats}
]
}
});

document.getElementById("compare-result").innerHTML=
`<div class="card"><h4>${langDB[l1].name}</h4>${langDB[l1].desc}</div>
<div class="card"><h4>${langDB[l2].name}</h4>${langDB[l2].desc}</div>`;
}

// Playground
function runCode(){
let code=document.getElementById("html-code").value;
let doc=document.getElementById("code-preview").contentWindow.document;
doc.open();doc.write(code);doc.close();
}

// Quiz
let qIndex=0,score=0;
const questions=[
{q:"Langage IA?",o:["HTML","Python"],a:1},
{q:"Structure Web?",o:["CSS","HTML"],a:1}
];

function startQuiz(){
qIndex=0;score=0;showQ();
}

function showQ(){
let q=questions[qIndex];
let div=document.getElementById("quiz");

if(!q){
div.innerHTML=`Score ${score}`;
return;
}

div.innerHTML=`<p>${q.q}</p>
${q.o.map((o,i)=>`<button onclick="check(${i})">${o}</button>`).join('')}`;
}

function check(i){
if(i===questions[qIndex].a) score++;
qIndex++;showQ();
}

// GAME
function generateGame(){
let name=document.getElementById("gameName").value.toLowerCase();
let iframe=document.getElementById("gamePreview").contentWindow.document;

if(name.includes("snake")){
iframe.open();
iframe.write("<h2 style='color:black;text-align:center'>🐍 Snake Game Ready</h2>");
iframe.close();
}
}

// YT
function openYT(){
let q=document.getElementById("q").value;
window.open("https://youtube.com/results?search_query="+q);
}
</script>

</body>
</html>

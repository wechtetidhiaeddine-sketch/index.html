<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anime Search</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url("https://wallpapercave.com/wp/wp5128415.jpg") no-repeat center center/cover;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.box {
  background: rgba(0,0,0,0.75);
  padding: 25px;
  border-radius: 15px;
  width: 340px;
  text-align: center;
  color: white;
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-top: 10px;
  outline: none;
}

.results {
  margin-top: 20px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.card {
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  overflow: hidden;
  font-size: 13px;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

button {
  background: #ff3d3d;
  color: white;
  border: none;
  padding: 6px;
  margin: 5px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
}

button:hover {
  background: #ff1a1a;
}
</style>
</head>

<body>

<div class="box">
  <h2>🎌 Anime App</h2>
  <input type="text" placeholder="اكتب اسم أنمي واضغط Enter">
  <div id="results" class="results"></div>
</div>

<script>
const input = document.querySelector("input");
const results = document.getElementById("results");

input.addEventListener("keydown", async (e) => {
  if (e.key === "Enter") {
    const query = input.value.trim();
    if (!query) return;

    results.innerHTML = "⏳ جاري البحث...";

    try {
      const res = await fetch(`https://api.jikan.moe/v4/anime?q=${query}`);
      const data = await res.json();

      results.innerHTML = "";

      data.data.slice(0, 6).forEach(anime => {
        const trailer = anime.trailer?.url;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <img src="${anime.images.jpg.image_url}">
          <p>${anime.title}</p>
          ${
            trailer
              ? `<button onclick="window.open('${trailer}', '_blank')">▶️ Trailer</button>`
              : `<p style="font-size:11px">لا يوجد Trailer</p>`
          }
        `;

        results.appendChild(card);
      });
    } catch (err) {
      results.innerHTML = "❌ حصل خطأ، حاول مرة أخرى";
    }
  }
});
</script>

</body>
</html>

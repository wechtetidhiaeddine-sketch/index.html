<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anime Search</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: url("https://wallpapercave.com/wp/wp5128415.jpg") no-repeat center center/cover;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.box {
  background: rgba(0,0,0,0.7);
  padding: 30px;
  border-radius: 15px;
  text-align: center;
  width: 320px;
  color: white;
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-top: 10px;
}

.results {
  margin-top: 20px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.card {
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  overflow: hidden;
  font-size: 13px;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}
</style>
</head>

<body>

<div class="box">
  <h2>🎌 Anime App</h2>
  <input type="text" placeholder="اكتب اسم أنمي واضغط Enter">
  <div id="results" class="results"></div>
</div>

<script>
const input = document.querySelector("input");
const results = document.getElementById("results");

input.addEventListener("keydown", async (e) => {
  if (e.key === "Enter") {
    results.innerHTML = "⏳ جاري البحث...";
    const query = input.value.trim();
    if (!query) return;

    const res = await fetch(`https://api.jikan.moe/v4/anime?q=${query}`);
    const data = await res.json();

    results.innerHTML = "";

    data.data.slice(0, 6).forEach(anime => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <img src="${anime.images.jpg.image_url}">
        <p>${anime.title}</p>
      `;
      results.appendChild(card);
    });
  }
});
</script>

</body>
</html>

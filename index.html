<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Max AI Search</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

.container{max-width:800px;margin:auto;padding:20px}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.1);
padding:15px;
border-radius:15px;
margin-top:12px;
transition:0.3s;
}

.card:hover{transform:scale(1.02)}

.search{
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
border-radius:25px;
border:none;
outline:none;
}

button{
padding:10px 15px;
border-radius:20px;
border:none;
cursor:pointer;
background:#4facfe;
color:white;
transition:0.3s;
}

button:hover{transform:scale(1.05)}

h1{margin-bottom:10px}
.small{font-size:12px;opacity:0.8}
</style>
</head>

<body>

<div class="container">

<h1>🤖 Pro Max AI Search</h1>

<div class="card search">
<input id="q" placeholder="Search anything...">
<button onclick="search()">🔍</button>
<button onclick="voice()">🎤</button>
</div>

<div id="result"></div>

<div class="card">
<h3>💬 AI Chat</h3>
<input id="chat" placeholder="Ask AI...">
<button onclick="askAI()">Send</button>
<div id="chatBox"></div>
</div>

<div class="card">
<h3>⚖ Compare</h3>
<input id="a" placeholder="Language 1">
<input id="b" placeholder="Language 2">
<button onclick="compare()">Compare</button>
<div id="cmp"></div>
</div>

<div class="card">
<h3>⭐ Favorites</h3>
<div id="fav"></div>
</div>

</div>

<script>

const WIKI="https://fr.wikipedia.org/api/rest_v1/page/summary/";
const OPENAI_API_KEY="PUT_YOUR_KEY_HERE";

async function search(){
let q=document.getElementById("q").value;
if(!q) return;

let res=await fetch(WIKI+q);
let data=await res.json();

document.getElementById("result").innerHTML=`
<div class="card">
<h2>${data.title}</h2>
<p>${data.extract || "No Wikipedia data"}</p>
<button onclick="save('${data.title}')">⭐ Save</button>
</div>`;

generateAI(q);
quiz(q);
}

function generateAI(topic){
document.getElementById("result").innerHTML+=`
<div class="card">🤖 AI Insight: ${topic} is widely used in modern development and technology ecosystems.</div>`;
}

async function askAI(){
let msg=document.getElementById("chat").value;
if(!msg) return;

document.getElementById("chatBox").innerHTML+=`<p>🧑 ${msg}</p>`;

try{
let res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+OPENAI_API_KEY
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[{role:"user",content:msg}]
})
});

let data=await res.json();
let reply=data.choices[0].message.content;

document.getElementById("chatBox").innerHTML+=`<p>🤖 ${reply}</p>`;
}catch(e){
document.getElementById("chatBox").innerHTML+="<p>❌ Error AI</p>";
}
}

function compare(){
let a=document.getElementById("a").value;
let b=document.getElementById("b").value;

if(!a||!b) return;

document.getElementById("cmp").innerHTML=`
<p>${a} vs ${b}</p>
<p>👉 ${a} is often used for backend/frontend, while ${b} has different ecosystem strengths.</p>`;
}

function save(x){
let f=JSON.parse(localStorage.getItem("fav")||"[]");
f.push(x);
localStorage.setItem("fav",JSON.stringify(f));
load();
}

function load(){
let f=JSON.parse(localStorage.getItem("fav")||"[]");
document.getElementById("fav").innerHTML=f.map(i=>`<div>⭐ ${i}</div>`).join("");
}
load();

function quiz(t){
document.getElementById("result").innerHTML+=`
<div class="card">
❓ ${t} is mainly used for?
<br><button onclick="alert('Correct answer depends on context 😄')">Answer</button>
</div>`;
}

function voice(){
let rec=new webkitSpeechRecognition();
rec.lang="en-US";
rec.onresult=e=>{
document.getElementById("q").value=e.results[0][0].transcript;
search();
};
rec.start();
}

</script>

</body>
</html>
